name: Update Citations

on:
  workflow_dispatch:
  schedule:
    - cron: '11 6 * * *' # daily at 06:15 UTC

jobs:
  update-plugins:
    name: Update citation counts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v5
      with:
        ref: gh-pages

    - name: Checkout scripts from default branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v5
      with:
        path: repo
        sparse-checkout: scripts

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install requests google-search-results

    - name: Generate citations badge
      run: python repo/scripts/serpapi-citations.py
      env:
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    - name: Commit and push if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add citations.svg
        git diff --cached --quiet || git commit -m "Update citations.svg"
        git push
