name: Build PDF

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

jobs:
  build-pdf:
    name: Build PDF documentation
    runs-on: ubuntu-latest
    concurrency:
      group: pdf-${{ github.workflow }}
      cancel-in-progress: true

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v5

    - name: Install TeX Live and fonts
      run: |
        sudo apt-get -qq update
        sudo apt-get -qq install \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          texlive-fonts-extra \
          latexmk

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version-file: ".python-version"

    - name: Install Sphinx and requirements
      run: uv sync

    - name: Build LaTeX
      run: |
        cd source
        uv run sphinx-build -b latex -j auto -E . ../build/latex

    - name: Get version
      id: version
      run: |
        VERSION=$(curl -s https://api.github.com/repos/openchemistry/avogadrolibs/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Build PDF
      continue-on-error: true
      run: |
        cd build/latex
        latexmk -pdf -dvi- -ps- -interaction=nonstopmode Avogadro.tex

    - name: Rename PDF
      run: cp build/latex/Avogadro.pdf "build/latex/Avogadro-v${VERSION}.pdf"
      env:
        VERSION: ${{ steps.version.outputs.version }}

    - name: Upload PDF artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: Avogadro-v${{ steps.version.outputs.version }}
        path: build/latex/Avogadro-v${{ steps.version.outputs.version }}.pdf
