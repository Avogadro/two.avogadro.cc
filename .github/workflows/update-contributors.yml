name: Update Contributors

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1' # weekly on Monday at 06:30 UTC

jobs:
  update-contributors:
    name: Update contributor list
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v5

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install PyGithub

    - name: Generate contributor list
      run: python scripts/github-contributors.py source/contrib/contributors.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and push if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add source/contrib/contributors.md
        git diff --cached --quiet || git commit -m "Update contributor list"
        git push
